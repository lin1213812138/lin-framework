services:
  mongodb:
    image: mongo:8
    container_name: lin-mongodb
    restart: unless-stopped
    ports:
      - "20010:20010"
    command: mongod --port 20010
    volumes:
      - mongodb_data:/data/db
      - ../mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro

  redis:
    image: redis:8-alpine
    container_name: lin-redis
    restart: unless-stopped
    ports:
      - "20020:20020"
    command: redis-server --appendonly yes --port 20020
    volumes:
      - redis_data:/data

  # Development services - hot reload via mounted volumes
  server:
    build:
      context: ../../
      dockerfile: apps/server/Dockerfile
      target: development
    container_name: lin-server
    restart: unless-stopped
    ports:
      - "6100:6100"
    volumes:
      - ../../apps/server/src:/app/apps/server/src
      - ../../packages:/app/packages
    environment:
      - NODE_ENV=development
      - PORT=6100
      - MONGODB_URI=mongodb://mongodb:20010/lin_framework
      - REDIS_HOST=redis
      - REDIS_PORT=20020
      - REDIS_PASSWORD=
      - JWT_SECRET=dev-secret-key-min-32-chars-long-for-development
      - LOG_LEVEL=debug
    depends_on:
      - mongodb
      - redis

  web:
    build:
      context: ../../
      dockerfile: apps/admin-web/Dockerfile
      target: development
    container_name: lin-web
    restart: unless-stopped
    ports:
      - "5173:5173"  # Vite dev server
    volumes:
      - ../../apps/admin-web/src:/app/apps/admin-web/src
      - ../../packages:/app/packages
    environment:
      - NODE_ENV=development
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: lin-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - web

volumes:
  mongodb_data:
  redis_data:
